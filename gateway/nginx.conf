# nginx reverse proxy for LiteLLM
# Place this file at /etc/nginx/conf.d/llms.conf
# (or adjust the volume mount in docker-compose.yml).
#
# This config handles two cases:
#   - HTTP only (default, simpler)
#   - HTTP → HTTPS redirect + TLS termination (uncomment the HTTPS block)
#
# Reload after changes: docker compose exec nginx nginx -s reload

upstream litellm {
    server litellm:4000;

    # keepalive connections to the upstream — reduces connection setup overhead
    # and is required for HTTP/1.1 proxying of streaming responses.
    keepalive 32;
}

# HTTP
server {
    listen 80;
    server_name llm.example.com;   # replace with your domain or internal hostname

    # Uncomment to redirect all HTTP traffic to HTTPS:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://litellm;

        # Required for HTTP/1.1 keepalives and chunked streaming (SSE).
        # Without these, nginx defaults to HTTP/1.0 with Connection: close,
        # which breaks streaming chat completions.
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable response buffering — required for streaming.
        proxy_buffering off;
        proxy_cache off;

        # LLM responses can be slow; give backends plenty of time.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # Increase body size limit for large embedding batch requests.
        client_max_body_size 10m;
    }

    # Health check endpoint (unauthenticated, for load balancers / uptime monitors)
    location /health {
        proxy_pass http://litellm/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }
}

